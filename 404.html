<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 48px 32px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e6fffb;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 10vw, 96px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    h2 {
      margin: 16px 0 12px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.2;
    }

    p {
      margin: 0 auto;
      max-width: 46ch;
      font-size: 17px;
      line-height: 1.7;
      color: var(--muted);
    }

    .actions {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      min-height: 48px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .helper {
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .card {
        padding: 36px 22px;
        border-radius: 16px;
      }

      p {
        font-size: 16px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="page-title">
    <div class="badge">Error 404</div>
    <h1>404</h1>
    <h2 id="page-title">Page not found</h2>
    <p>
      The page you are trying to open may have been moved, renamed, or is temporarily unavailable.
      Please return to the homepage to continue browsing.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="/">Go to Home</a>
    </div>

    <div class="helper">Tip: We are in service for the people.</div>
  </main>
</body>
</html>
